services:
  angular:
    image: node:20
    container_name: angular_landing_page
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./:/app
      - angular_node_modules:/app/node_modules
    ports:
      - '4200:4200'
    environment:
      CHOKIDAR_USEPOLLING: 'true'
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --poll=2000"

volumes:
  angular_node_modules:
