<section class="course-formats py-4">
  <div class="container">
    <div class="mx-auto text-center mb-4">
      <h2 class="display-6 fw-semibold">Course Types</h2>
      <p class="subtitle">
        Choose type of course which fits you the best
      </p>
    </div>

    <div class="row g-3" [class.justify-content-center]="config.formats.length < 3">
      @for (format of config.formats; track format.title) {
      <div class="col-12 d-flex" [class.col-md-6]="config.formats.length > 1"
        [class.col-xl-4]="config.formats.length > 2" [class.col-lg-8]="config.formats.length === 1">
        <div class="card h-100 w-100 text-center">

          <div class="card-header py-3 border-0">
            <h3 class="h5 my-0 fw-medium">{{ format.title }}</h3>
          </div>

          <div class="card-body d-flex flex-column">
            <ul class="list-unstyled mb-4 flex-grow-1">
              @for (feature of format.features; track feature) {
              <li class="mb-2">{{ feature }}</li>
              }
            </ul>

            <button type="button" class="btn btn-primary">
              {{ format.buttonText }}
            </button>
          </div>

        </div>
      </div>
      }
    </div>
  </div>
</section>
