<section class="course-formats py-5">
  <div class="container">
    <div class="pricing-header mx-auto text-center mb-5">
      <h2 class="display-5 fw-normal text-body-emphasis">Course Types</h2>
      <p class="fs-5 text-body-secondary">Choose type of course which fits you the best!</p>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
      @for (format of config.formats; track format.title) {
        <div class="col d-flex">
          <div class="card h-100 w-100 rounded-3 shadow-sm text-center">
            <div class="card-header py-3">
              <h3 class="h4 my-0 fw-normal">{{ format.title }}</h3>
            </div>

            <div class="card-body d-flex flex-column">
              <ul class="list-unstyled mt-3 mb-4 flex-grow-1">
                @for (feature of format.features; track feature) {
                  <li>{{ feature }}</li>
                }
              </ul>

              <button type="button" class="btn" [ngClass]="format.buttonClass">
                {{ format.buttonText }}
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
