<section id="course" class="hero-section py-5">
  <div class="container">
    <div class="row align-items-center g-4">

      <div class="col-12 col-md-6 text-center text-md-start">
        <h1 class="hero-title fw-bold mb-3">
          {{ hero.title }}
        </h1>

        <p class="hero-text mb-3">
          {{ hero.text }}
        </p>

        <a [href]="hero.buttonLink" class="btn btn-primary mt-2">
          {{ hero.buttonText }}
        </a>
      </div>

      <div class="col-12 col-md-6 text-center">
        <img [src]="hero.imageUrl" [alt]="hero.imageAlt" class="img-fluid hero-image" />
      </div>

    </div>
  </div>
</section>
