@if (links.length) {
<section class="main-links-section container py-3">
    <div class="row g-3" [class.justify-content-center]="links.length === 1">
        @for (link of links; track link.url) {
        <div class="col-12" [class.col-md-6]="links.length > 1" [class.col-md-8]="links.length === 1">
            <a class="main-link-card" [href]="link.url" target="_blank" rel="noopener">
                {{ link.label }}
            </a>
        </div>
        }
    </div>
</section>
}
