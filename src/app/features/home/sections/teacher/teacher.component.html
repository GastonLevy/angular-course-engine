<section id="teacher" class="py-5">
  <div class="container">
    <h2 class="text-center mb-4">Our Instructors</h2>

    <div class="row g-4">
      @for (teacher of teachers; track teacher.name) {
        <div class="col-12 col-md-4">
          <div class="text-center">
            <img [src]="teacher.imageUrl" [alt]="teacher.imageAlt" class="teacher-img mb-3" />

            <h3 class="fw-bold mb-1">{{ teacher.name }}</h3>
            <h5 class="text-muted mb-2">{{ teacher.title }}</h5>
            <p>{{ teacher.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
