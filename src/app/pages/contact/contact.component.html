<section class="contact-section py-5">
  <div class="container">
    <h1 class="contact-title mb-5 text-center">Contact</h1>

    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card contact-intro shadow-sm border-0">
          <div class="card-body">
            <div class="contact-personal mb-4">
              <h3 class="contact-name mb-1">Gastón Omar Lino Levy</h3>

              <div class="contact-email-row">
                <span class="contact-email-text">ggastlino@gmail.com</span>

                <div class="contact-email-actions">
                  <a href="mailto:ggastlino@gmail.com" class="contact-email-btn" title="Send email"
                    aria-label="Send email">
                    <i class="bi bi-envelope-fill"></i>
                  </a>

                  <button type="button" class="contact-email-btn" title="Copy email" aria-label="Copy email"
                    (click)="copyEmail()">
                    <i class="bi bi-clipboard"></i>
                  </button>
                </div>
              </div>
            </div>

            <p class="mb-4">
              If you want to know more about this project or discuss opportunities, feel free to
              reach out.
            </p>

            <div class="contact-actions mb-4">
              <a href="https://github.com/GastonLevy" target="_blank" rel="noopener noreferrer"
                class="contact-action github">
                <i class="bi bi-github"></i>
                GitHub
              </a>

              <a href="https://www.linkedin.com/in/gaston-omar-lino-levy" target="_blank" rel="noopener noreferrer"
                class="contact-action linkedin">
                <i class="bi bi-linkedin"></i>
                LinkedIn
              </a>
            </div>

            <p class="contact-note mb-0">
              Built as part of a university project where I led the technical direction and
              implemented most of the application.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
